[/Script/UnrealEd.ProjectPackagingSettings]
UsePakFile=True
bGenerateChunks=False
bCompressed=True
bUseZenStore=False
; Tagged (name-based) property serialization: REQUIRED for the UE-only backend.
; Our /Script/Dominion stub classes are partial mirrors of the game's classes; with
; unversioned properties the game would map values by schema position and read garbage.
bUseUnversionedProperties=False
+DirectoriesToAlwaysCook=(Path="/Game/RSDWBuilds")
; UE-backend DAs live in the game's AssetManager scan tree (staged into the pak);
; editor-only stubs (BP_T1_BasePiece, DT placeholders) cook as dependencies but are
; NOT staged (Pack-IoStore stages only the RSDWBuilds subtree of Gameplay).
+DirectoriesToAlwaysCook=(Path="/Game/Gameplay/BaseBuilding_New/BuildingPieces/RSDWBuilds")

[/Script/EngineSettings.GameMapsSettings]
EditorStartupMap=/Game/map
GameDefaultMap=/Game/map
LocalMapOptions=
TransitionMap=

[/Script/Engine.AssetManagerSettings]
